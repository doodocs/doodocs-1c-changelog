<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Модуль — Doodocs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --background:           0 0% 100%;
        --foreground:           222.2 84% 4.9%;
        --card:                 0 0% 100%;
        --primary:              221.2 83.2% 53.3%;
        --primary-foreground:   210 40% 98%;
        --muted:                210 40% 96.1%;
        --muted-foreground:     215.4 16.3% 46.9%;
        --border:               214.3 31.8% 91.4%;
        --radius:               0.5rem;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        background: hsl(var(--background));
        color: hsl(var(--foreground));
        min-height: 100vh;
        line-height: 1.5;
      }

      /* ── Header ── */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid hsl(var(--border));
        background: hsl(var(--background) / 0.9);
        backdrop-filter: blur(8px);
      }
      .header-inner {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 24px;
        height: 58px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-mark {
        width: 30px;
        height: 30px;
        background: hsl(var(--primary));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        text-decoration: none;
      }
      .logo-text {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        text-decoration: none;
        color: hsl(var(--foreground));
      }
      .header-divider { width: 1px; height: 18px; background: hsl(var(--border)); margin: 0 2px; }
      .header-caption { font-size: 13px; color: hsl(var(--muted-foreground)); }

      /* ── Main ── */
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }

      /* ── Breadcrumb ── */
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: hsl(var(--muted-foreground));
        margin-bottom: 32px;
      }
      .breadcrumb a {
        color: hsl(var(--muted-foreground));
        text-decoration: none;
        transition: color 0.15s;
      }
      .breadcrumb a:hover { color: hsl(var(--primary)); }
      .breadcrumb-sep { opacity: 0.4; font-size: 16px; line-height: 1; }
      .breadcrumb-current { color: hsl(var(--foreground)); font-weight: 500; }

      /* ── Module hero ── */
      .module-hero {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 32px;
        padding-bottom: 32px;
        border-bottom: 1px solid hsl(var(--border));
      }
      .module-hero-icon {
        width: 56px;
        height: 56px;
        background: hsl(var(--primary) / 0.1);
        color: hsl(var(--primary));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 1px solid hsl(var(--primary) / 0.15);
      }
      .module-hero-body { flex: 1; min-width: 0; }
      .module-hero-name {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.025em;
        line-height: 1.2;
        margin-bottom: 8px;
      }
      .module-hero-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border-radius: 9999px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-blue {
        background: hsl(var(--primary) / 0.1);
        color: hsl(var(--primary));
        border: 1px solid hsl(var(--primary) / 0.2);
        font-family: 'Geist Mono', monospace;
      }
      .badge-muted {
        background: hsl(var(--muted));
        color: hsl(var(--muted-foreground));
        border: 1px solid hsl(var(--border));
      }
      .module-hero-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
        white-space: nowrap;
        border: none;
      }
      .btn:active { transform: translateY(0) !important; box-shadow: none !important; }

      .btn-primary {
        background: hsl(var(--primary));
        color: hsl(var(--primary-foreground));
        padding: 9px 18px;
      }
      .btn-primary:hover {
        background: hsl(221.2 83.2% 47%);
        box-shadow: 0 4px 14px hsl(var(--primary) / 0.35);
        transform: translateY(-1px);
      }

      .btn-ghost {
        background: transparent;
        color: hsl(var(--muted-foreground));
        padding: 9px 14px;
        border: 1px solid hsl(var(--border));
      }
      .btn-ghost:hover {
        background: hsl(var(--muted));
        color: hsl(var(--foreground));
      }

      /* ── Cards grid ── */
      .grid {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 20px;
        align-items: start;
      }
      @media (max-width: 680px) {
        .grid { grid-template-columns: 1fr; }
      }

      /* ── Card ── */
      .card {
        background: hsl(var(--card));
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        overflow: hidden;
      }
      .card-header {
        padding: 16px 20px;
        border-bottom: 1px solid hsl(var(--border));
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-title {
        font-size: 13px;
        font-weight: 600;
        color: hsl(var(--foreground));
        letter-spacing: -0.01em;
      }
      .card-icon { color: hsl(var(--muted-foreground)); display: flex; }
      .card-body { padding: 20px; }

      /* ── Changelog ── */
      .changelog {
        font-size: 14px;
        line-height: 1.7;
        color: hsl(var(--foreground));
      }
      .changelog h3 {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: hsl(var(--muted-foreground));
        margin-top: 20px;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid hsl(var(--border));
      }
      .changelog h3:first-child { margin-top: 0; }
      .changelog ul {
        margin-left: 18px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .changelog li { color: hsl(var(--foreground)); }
      .changelog p { margin-bottom: 8px; }
      .changelog strong { font-weight: 600; }

      /* ── Info sidebar ── */
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid hsl(var(--border));
        font-size: 13.5px;
      }
      .info-row:first-child { padding-top: 0; }
      .info-row:last-child { border-bottom: none; padding-bottom: 0; }
      .info-label { color: hsl(var(--muted-foreground)); flex-shrink: 0; }
      .info-value {
        font-weight: 500;
        text-align: right;
        font-family: 'Geist Mono', monospace;
        font-size: 12.5px;
        word-break: break-all;
      }

      /* ── Download card ── */
      .download-card {
        background: hsl(var(--primary) / 0.04);
        border: 1px solid hsl(var(--primary) / 0.15);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .download-title {
        font-size: 13px;
        font-weight: 600;
        color: hsl(var(--foreground));
      }
      .download-sub { font-size: 12.5px; color: hsl(var(--muted-foreground)); }
      .download-card .btn-primary { width: 100%; justify-content: center; }

      /* ── Related versions ── */
      .related-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .related-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border-radius: calc(var(--radius) - 2px);
        text-decoration: none;
        transition: background 0.1s;
      }
      .related-item:hover { background: hsl(var(--muted)); }
      .related-item.active {
        background: hsl(var(--primary) / 0.08);
        border: 1px solid hsl(var(--primary) / 0.15);
      }
      .related-item-name {
        font-size: 13px;
        font-weight: 500;
        color: hsl(var(--foreground));
        font-family: 'Geist Mono', monospace;
      }
      .related-item.active .related-item-name { color: hsl(var(--primary)); }
      .related-item-date { font-size: 11.5px; color: hsl(var(--muted-foreground)); }

      /* ── Not found ── */
      .not-found {
        padding: 80px 24px;
        text-align: center;
        color: hsl(var(--muted-foreground));
      }
      .not-found-icon { font-size: 36px; margin-bottom: 12px; }
      .not-found-text { font-size: 15px; margin-bottom: 20px; }

      /* ── Page animation ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate { animation: fadeUp 0.3s ease both; }
      .animate-1 { animation-delay: 0.04s; }
      .animate-2 { animation-delay: 0.09s; }
      .animate-3 { animation-delay: 0.14s; }
      .animate-4 { animation-delay: 0.19s; }

      footer {
        border-top: 1px solid hsl(var(--border));
        padding: 22px 24px;
        text-align: center;
        font-size: 13px;
        color: hsl(var(--muted-foreground));
      }
    </style>
  </head>
  <body>

    <!-- ── Header ── -->
    <header>
      <div class="header-inner">
        <a class="logo-mark" href="index.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
            <path d="m7.5 4.27 9 5.15"/>
            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/>
            <path d="M12 22V12"/>
          </svg>
        </a>
        <a href="index.html" class="logo-text">Doodocs</a>
        <div class="header-divider"></div>
        <span class="header-caption" id="header-caption">Модуль</span>
      </div>
    </header>

    <!-- ── Main ── -->
    <main id="main">
      <div class="not-found" style="display:none" id="not-found">
        <div class="not-found-icon">📭</div>
        <div class="not-found-text">Модуль не найден</div>
        <a href="index.html" class="btn btn-ghost">← Назад к реестру</a>
      </div>
    </main>

    <footer>© 2026 Doodocs — Публичный реестр модулей 1С</footer>

    <script>
      // ── Helpers ──────────────────────────────────────────
      function parseVersion(v) {
        if (!v) return '—';
        const p = v.split('/');
        return p.length > 1 ? 'v' + p[1] : v;
      }

      function parseModuleName(key) {
        const m = key.match(/^(.+?)\s+v[\d.]+$/);
        return m ? m[1] : key;
      }

      function formatDate(d) {
        if (!d) return '—';
        return new Date(d).toLocaleDateString('ru-RU', {
          day: '2-digit', month: 'long', year: 'numeric'
        });
      }

      function mdToHtml(text) {
        if (!text) return '<p>—</p>';
        text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

        const lines = text.split('\n');
        let html = '';
        let inUl = false;

        for (const raw of lines) {
          const line = raw.trim();
          if (!line) {
            if (inUl) { html += '</ul>'; inUl = false; }
            continue;
          }
          if (/^### /.test(line)) {
            if (inUl) { html += '</ul>'; inUl = false; }
            html += `<h3>${line.slice(4)}</h3>`;
          } else if (/^[-*] /.test(line)) {
            if (!inUl) { html += '<ul>'; inUl = true; }
            html += `<li>${inlineMd(line.slice(2))}</li>`;
          } else {
            if (inUl) { html += '</ul>'; inUl = false; }
            html += `<p>${inlineMd(line)}</p>`;
          }
        }
        if (inUl) html += '</ul>';
        return html;
      }

      function inlineMd(s) {
        return s
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>');
      }

      // ── SVG Icons ─────────────────────────────────────────
      const ICON_PKG = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="m7.5 4.27 9 5.15"/>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>`;

      const ICON_DL = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>`;

      const ICON_DOC = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>`;

      const ICON_INFO = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>`;

      const ICON_HISTORY = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="12 8 12 12 14 14"/>
        <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/>
      </svg>`;

      const ICON_BACK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>`;

      // ── Render page ────────────────────────────────────────
      function renderPage(key, info, allEntries) {
        const moduleName = parseModuleName(key);
        const version    = parseVersion(info.version);
        const typeMatch  = moduleName.match(/-([A-Z]+)$/);
        const typeTag    = typeMatch ? typeMatch[1] : '1С';

        // Related versions — same module name, sorted newest first
        const related = allEntries
          .filter(([k]) => parseModuleName(k) === moduleName)
          .sort((a, b) => (b[1].date ?? '').localeCompare(a[1].date ?? ''));

        // Update header caption & page title
        document.getElementById('header-caption').textContent = moduleName;
        document.title = `${moduleName} ${version} — Doodocs`;

        const isDownloadTelegram = info.download?.includes('t.me');
        const downloadLabel = isDownloadTelegram ? 'Открыть в Telegram' : 'Скачать файл (.epf)';

        const main = document.getElementById('main');
        main.innerHTML = `
          <!-- Breadcrumb -->
          <nav class="breadcrumb animate animate-1">
            <a href="index.html">Реестр</a>
            <span class="breadcrumb-sep">/</span>
            <span>${moduleName}</span>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">${version}</span>
          </nav>

          <!-- Module hero -->
          <div class="module-hero animate animate-2">
            <div class="module-hero-icon">${ICON_PKG}</div>
            <div class="module-hero-body">
              <h1 class="module-hero-name">${moduleName}</h1>
              <div class="module-hero-meta">
                <span class="badge badge-blue">${version}</span>
                <span class="badge badge-muted">${typeTag}</span>
                <span class="badge badge-muted">${formatDate(info.date)}</span>
              </div>
              <div class="module-hero-actions">
                ${info.download
                  ? `<a href="${info.download}" target="_blank" rel="noopener" class="btn btn-primary">${ICON_DL} ${downloadLabel}</a>`
                  : ''
                }
                <a href="index.html" class="btn btn-ghost">${ICON_BACK} К реестру</a>
              </div>
            </div>
          </div>

          <!-- Content grid -->
          <div class="grid">

            <!-- Left: Changelog -->
            <div class="animate animate-3">
              <div class="card">
                <div class="card-header">
                  <span class="card-icon">${ICON_DOC}</span>
                  <span class="card-title">Список изменений</span>
                </div>
                <div class="card-body">
                  <div class="changelog">${mdToHtml(info.description)}</div>
                </div>
              </div>
            </div>

            <!-- Right: sidebar -->
            <div class="animate animate-4" style="display:flex;flex-direction:column;gap:16px">

              <!-- Info -->
              <div class="card">
                <div class="card-header">
                  <span class="card-icon">${ICON_INFO}</span>
                  <span class="card-title">Информация</span>
                </div>
                <div class="card-body">
                  <div class="info-row">
                    <span class="info-label">Версия</span>
                    <span class="info-value">${version}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Платформа</span>
                    <span class="info-value">${typeTag}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Дата</span>
                    <span class="info-value" style="font-family:inherit">${formatDate(info.date)}</span>
                  </div>
                  ${info.download ? `
                  <div class="info-row">
                    <span class="info-label">Формат</span>
                    <span class="info-value">${info.download.endsWith('.epf') ? '.epf' : 'Telegram'}</span>
                  </div>` : ''}
                </div>
              </div>

              <!-- Download CTA -->
              ${info.download ? `
              <div class="download-card">
                <div>
                  <div class="download-title">Скачать модуль</div>
                  <div class="download-sub" style="margin-top:4px">${version} · ${typeTag}</div>
                </div>
                <a href="${info.download}" target="_blank" rel="noopener" class="btn btn-primary">
                  ${ICON_DL} ${downloadLabel}
                </a>
              </div>` : ''}

              <!-- Related versions -->
              ${related.length > 1 ? `
              <div class="card">
                <div class="card-header">
                  <span class="card-icon">${ICON_HISTORY}</span>
                  <span class="card-title">Другие версии</span>
                </div>
                <div class="card-body" style="padding:8px">
                  <div class="related-list">
                    ${related.map(([k, v]) => {
                      const ver = parseVersion(v.version);
                      const isActive = k === key;
                      return `<a href="module.html?id=${encodeURIComponent(k)}"
                                 class="related-item${isActive ? ' active' : ''}">
                        <span class="related-item-name">${ver}</span>
                        <span class="related-item-date">${formatDate(v.date)}</span>
                      </a>`;
                    }).join('')}
                  </div>
                </div>
              </div>` : ''}

            </div>
          </div>
        `;
      }

      // ── Init ────────────────────────────────────────────────
      const params = new URLSearchParams(location.search);
      const id = params.get('id');

      if (!id) {
        location.href = 'index.html';
      } else {
        fetch('registry.json')
          .then(r => r.json())
          .then(data => {
            const info = data[id];
            if (!info) {
              document.getElementById('not-found').style.display = 'block';
              return;
            }
            const allEntries = Object.entries(data);
            renderPage(id, info, allEntries);
          })
          .catch(() => {
            document.getElementById('not-found').style.display = 'block';
          });
      }
    </script>
  </body>
</html>
